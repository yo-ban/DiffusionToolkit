name: .NET Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest

    env:
      Solution_Name: Diffusion.Toolkit.sln
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build
      run: dotnet build ${{ env.Solution_Name }} -c ${{ env.Configuration }} --no-restore

    - name: Test
      run: dotnet test ${{ env.Solution_Name }} -c ${{ env.Configuration }} --no-build --verbosity normal

    - name: Publish Toolkit
      run: dotnet publish Diffusion.Toolkit/Diffusion.Toolkit.csproj -c ${{ env.Configuration }} -r win-x64 -o ./build --no-self-contained /p:PublishSingleFile=true /p:PublishReadyToRun=false /p:DebugType=None /p:DebugSymbols=false

    - name: Publish Updater
      run: dotnet publish Diffusion.Updater/Diffusion.Updater.csproj -c ${{ env.Configuration }} -r win-x64 -o ./build --no-self-contained /p:PublishSingleFile=true /p:PublishReadyToRun=false /p:DebugType=None /p:DebugSymbols=false

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DiffusionToolkit
        path: build
